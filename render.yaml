services:
  - type: web
    name: cybersec-rag-assistant
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHROMA_PATH
        value: chroma_db
      - key: COLLECTION_NAME
        value: cybersecurity_documents
      - key: CHUNK_SIZE
        value: 500
      - key: CHUNK_OVERLAP
        value: 100
      - key: TOP_K
        value: 3
